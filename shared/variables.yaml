save_reminder: "Save your work often — use Ctrl+S (Windows) or Cmd+S (Mac). Unsaved work can be lost if the computer sleeps or restarts."
academic_integrity: "All work you submit must be your own. Using code written by someone else without attribution is academic dishonesty. You may look things up and ask for help — that is expected. Submitting someone else's code as your own is not."
late_penalty: "Late work is not accepted without prior instructor approval. If you need an extension, ask before the due date."
