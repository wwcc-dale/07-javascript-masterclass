title: "Personal Profile Card Rubric"
free_form_criterion_comments: true

criteria:
  - description: "Code Correctness"
    long_description: >
      The submitted HTML file opens without errors. All seven required variables
      are declared. trim(), toUpperCase(), arithmetic birth year calculation,
      and if/else adult status check are all present and correct. The full profile
      card output appears in the browser console.
    points: 40
    ratings:
      - description: "Excelling (40)"
        long_description: "All required elements are present and correct. Console output matches the expected profile card format with all five lines including the === header and footer."
        points: 40
      - description: "Achieving (32)"
        long_description: "Core requirements are met. One or two minor issues — for example, a missing method or a slightly incorrect output format — but the profile card is largely correct."
        points: 32
      - description: "Developing (24)"
        long_description: "File opens but several required elements are missing or incorrect. At least three of the five profile lines appear correctly."
        points: 24
      - description: "Beginning (16)"
        long_description: "File has significant errors. Fewer than three output lines are correct or the console shows errors."
        points: 16
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or the file does not match the assignment requirements."
        points: 0

  - description: "Code Readability"
    long_description: >
      Code is cleanly formatted with consistent indentation. At least three
      comments explain key steps. Variable names are meaningful and use camelCase.
      Template literals are used for the output (not string concatenation).
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "Code is neatly indented. Three or more meaningful comments present. Template literals used throughout. Variable names are descriptive and use camelCase."
        points: 20
      - description: "Achieving (16)"
        long_description: "Code is mostly readable. One or two comments present. Template literals used for most output. Minor formatting issues."
        points: 16
      - description: "Developing (12)"
        long_description: "Code has formatting issues or missing comments, but the logic is still understandable."
        points: 12
      - description: "Beginning (8)"
        long_description: "Code is hard to read. Little indentation, no comments, and string concatenation instead of template literals."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0

  - description: "Stretch Level Attempted"
    long_description: >
      Student attempted a stretch level beyond the base requirements.
    points: 20
    ratings:
      - description: "Advanced (20)"
        long_description: "Student completed the Advanced stretch: input validation using a nested conditional, plus favoriteNumberSquared using ** included in the profile output."
        points: 20
      - description: "Intermediate (16)"
        long_description: "Student completed the Intermediate stretch: timeOfDay switch statement with a greeting variable added as a sixth profile output line."
        points: 16
      - description: "Base Completed (12)"
        long_description: "Student completed only the Base level fully and correctly."
        points: 12
      - description: "Base Incomplete (8)"
        long_description: "Student attempted the Base level but did not complete all required elements."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or no recognizable attempt."
        points: 0

  - description: "Following Instructions"
    long_description: >
      Student followed the assignment instructions: correct file name, all required
      variable names used, const/let used correctly (no var), submitted via Canvas.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "File is named profile-card.html. All required variables are present. const/let used correctly throughout. Submitted via Canvas."
        points: 20
      - description: "Achieving (16)"
        long_description: "Minor deviations from instructions but overall the assignment was followed correctly."
        points: 16
      - description: "Developing (12)"
        long_description: "Several instructions were not followed — for example, wrong variable names, var used instead of const/let, or wrong file name."
        points: 12
      - description: "Beginning (8)"
        long_description: "Major departures from instructions. Submission barely resembles what was asked."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0
