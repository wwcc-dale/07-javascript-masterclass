description: "Code Readability"
long_description: >
  Variable names are descriptive, indentation is consistent, and the code is
  easy to follow without needing extra explanation.
points: 20
ratings:
  - description: "Excelling (20)"
    long_description: >
      All names are meaningful, indentation is consistent, and the code reads
      clearly from top to bottom.
    points: 20
  - description: "Achieving (16)"
    long_description: >
      Names are mostly meaningful. Formatting is consistent with one or two
      minor issues.
    points: 16
  - description: "Developing (12)"
    long_description: >
      Some names are unclear or formatting is inconsistent in ways that make
      the code harder to read.
    points: 12
  - description: "Beginning (8)"
    long_description: >
      Variable names are single letters or meaningless. Indentation is
      inconsistent throughout.
    points: 8
  - description: "No Evidence (0)"
    long_description: "No submission or code is not readable in any form."
    points: 0
