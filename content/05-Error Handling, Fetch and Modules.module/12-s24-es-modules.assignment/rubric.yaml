title: "Helper Module Project Rubric"
free_form_criterion_comments: true

criteria:
  - description: "Code Correctness"
    long_description: >
      All four files are present and work correctly together. utils.js exports
      three named functions (formatName, clamp, randomInt). data.js exports a
      default array of 5+ person objects with the required properties. app.js
      imports from both files correctly and uses all three utility functions.
      index.html loads app.js with type="module". All output appears in the
      console without errors.
    points: 40
    ratings:
      - description: "Excelling (40)"
        long_description: "All four files present. Named exports in utils.js correct. Default export in data.js correct. app.js imports both correctly. All three utility functions are used. Formatted, clamped, and random int output all appear correctly. No console errors."
        points: 40
      - description: "Achieving (32)"
        long_description: "All four files present and mostly correct. One or two minor issues (e.g., one import uses wrong syntax or one function produces slightly incorrect output) but the module structure works."
        points: 32
      - description: "Developing (24)"
        long_description: "At least two files work correctly. Module import/export is attempted but has errors in some places. At least one utility function works and produces output."
        points: 24
      - description: "Beginning (16)"
        long_description: "Files are present but module system is not working. Missing type=module, incorrect import syntax, or modules are not connected correctly."
        points: 16
      - description: "No Evidence (0)"
        long_description: "Nothing submitted, or the submitted files do not match the assignment requirements."
        points: 0

  - description: "Code Readability"
    long_description: >
      Each file has a comment at the top describing its purpose. Code is
      neatly indented. Import statements are grouped at the top of app.js.
      Function names and variable names are clear and use camelCase.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "Each file has a clear one-sentence comment at the top. Imports are grouped at the top of app.js. Code is neatly indented throughout. Variable and function names are descriptive."
        points: 20
      - description: "Achieving (16)"
        long_description: "Comments are present but may be incomplete or missing from one file. Code is mostly readable."
        points: 16
      - description: "Developing (12)"
        long_description: "Comments are missing from most files. Code has formatting issues but is still understandable."
        points: 12
      - description: "Beginning (8)"
        long_description: "No comments. Code is hard to read. Imports are disorganized."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0

  - description: "Stretch Level Attempted"
    long_description: >
      Student attempted a stretch level beyond the base requirements.
    points: 20
    ratings:
      - description: "Advanced (20)"
        long_description: "Student completed the Advanced stretch: wrote groupBy() utility, exported it, imported it in app.js, used it to group people by a property, and logged the result."
        points: 20
      - description: "Intermediate (16)"
        long_description: "Student completed the Intermediate stretch: added average() to utils.js, MAX_SCORE to data.js, and used both in app.js."
        points: 16
      - description: "Base Completed (12)"
        long_description: "Student completed only the Base level but did so fully and correctly."
        points: 12
      - description: "Base Incomplete (8)"
        long_description: "Student attempted the Base level but did not complete all required elements."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or no recognizable attempt at any stretch level."
        points: 0

  - description: "Following Instructions"
    long_description: >
      Student followed the assignment instructions: all files are correctly named,
      type=module is used in the script tag, all four files are uploaded to Canvas.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "All files named correctly (utils.js, data.js, app.js, index.html). type=module is on the script tag. All four files submitted via Canvas."
        points: 20
      - description: "Achieving (16)"
        long_description: "Minor deviations from instructions (e.g., one file named slightly differently or type=module missing but modules still work another way) but overall instructions followed."
        points: 16
      - description: "Developing (12)"
        long_description: "Several instructions not followed (e.g., type=module missing and project broken, files not named correctly, fewer than 4 files submitted)."
        points: 12
      - description: "Beginning (8)"
        long_description: "Major departures from instructions. Submission barely resembles what was asked for."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0
