title: "Loops Assignment Rubric"
free_form_criterion_comments: true

criteria:
  - description: "Code Correctness"
    long_description: >
      The submitted code runs without errors and produces the correct output.
    points: 40
    ratings:
      - description: "Excelling (40)"
        long_description: "Code runs correctly and meets all requirements."
        points: 40
      - description: "Achieving (32)"
        long_description: "Code runs and meets core requirements with minor issues."
        points: 32
      - description: "Developing (24)"
        long_description: "Code has logic errors but at least half the requirements work."
        points: 24
      - description: "Beginning (16)"
        long_description: "Code has significant errors or crashes."
        points: 16
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or code does not match the assignment."
        points: 0

  - description: "Code Readability"
    long_description: >
      Variable and function names are descriptive, indentation is consistent, and the code is easy to follow.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "All names meaningful, indentation consistent, code reads clearly."
        points: 20
      - description: "Achieving (16)"
        long_description: "Names mostly meaningful, formatting consistent with minor issues."
        points: 16
      - description: "Developing (12)"
        long_description: "Some unclear names or inconsistent formatting."
        points: 12
      - description: "Beginning (8)"
        long_description: "Single-letter names, inconsistent indentation throughout."
        points: 8
      - description: "No Evidence (0)"
        long_description: "No submission or code is unreadable."
        points: 0

  - description: "Stretch Level Attempted"
    long_description: >
      Student attempted the appropriate stretch level and completed its requirements.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "Advanced level completed correctly."
        points: 20
      - description: "Achieving (16)"
        long_description: "Intermediate level completed correctly."
        points: 16
      - description: "Developing (12)"
        long_description: "Base level completed correctly."
        points: 12
      - description: "Beginning (8)"
        long_description: "Base level attempted but key requirements missing."
        points: 8
      - description: "No Evidence (0)"
        long_description: "No submission or no recognizable attempt."
        points: 0

  - description: "Following Instructions"
    long_description: >
      The submission matches the specified requirements: correct file names, required sections, and stated constraints.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "All instructions followed exactly. File named correctly, all sections present."
        points: 20
      - description: "Achieving (16)"
        long_description: "Instructions mostly followed. One or two minor deviations."
        points: 16
      - description: "Developing (12)"
        long_description: "Several instructions missed or file not named correctly."
        points: 12
      - description: "Beginning (8)"
        long_description: "Major instructions missed or file structure wrong."
        points: 8
      - description: "No Evidence (0)"
        long_description: "No submission."
        points: 0
