description: "Stretch Level Attempted"
long_description: >
  Student attempted the appropriate stretch level (Base, Intermediate, or
  Advanced) and completed the requirements for that level.
points: 20
ratings:
  - description: "Excelling (20)"
    long_description: >
      Advanced level completed correctly and demonstrates a thorough
      understanding of the concepts.
    points: 20
  - description: "Achieving (16)"
    long_description: >
      Intermediate level completed correctly, or Advanced attempted with
      most requirements met.
    points: 16
  - description: "Developing (12)"
    long_description: >
      Base level completed correctly. Student did not attempt a higher level
      but all Base requirements are met.
    points: 12
  - description: "Beginning (8)"
    long_description: >
      Base level attempted but key requirements are missing or incorrect.
    points: 8
  - description: "No Evidence (0)"
    long_description: "No submission or no recognizable attempt at any level."
    points: 0
