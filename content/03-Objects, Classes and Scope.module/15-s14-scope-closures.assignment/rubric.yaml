title: "Scope and Closures Explorer Rubric"
free_form_criterion_comments: true

criteria:
  - description: "Code Correctness"
    long_description: >
      The submitted HTML file runs without errors. All three examples produce
      correct output: block scope vs. global scope demonstrated correctly, variable
      shadowing shown with both inner and outer values logged, and the closure
      counter increments and resets correctly.
    points: 40
    ratings:
      - description: "Excelling (40)"
        long_description: "File opens without errors. All three examples work correctly. Block scope correctly limits let, var correctly leaks, shadowing shows both values, closure counter increments to 3 and resets to 0."
        points: 40
      - description: "Achieving (32)"
        long_description: "Most examples correct. One minor issue (e.g., the out-of-scope demonstration is missing or the closure reset is slightly off) but the core behavior is shown."
        points: 32
      - description: "Developing (24)"
        long_description: "File opens but one of the three examples is missing or significantly wrong. The other two work correctly."
        points: 24
      - description: "Beginning (16)"
        long_description: "File has significant errors. Fewer than two examples work correctly or the console shows errors."
        points: 16
      - description: "No Evidence (0)"
        long_description: "Nothing submitted, or the submitted file does not match the assignment requirements."
        points: 0

  - description: "Code Readability"
    long_description: >
      Code is cleanly formatted. Each example is clearly separated with a comment
      header. Comments within each example explain the scoping behavior in plain
      language. Variable names are clear and use camelCase.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "Code has clear section headers for all three examples. Each example has comments explaining why the behavior happens, not just what happens. Indentation is consistent and names are descriptive."
        points: 20
      - description: "Achieving (16)"
        long_description: "Code is mostly readable. Section headers present. Comments exist but some are brief or could be clearer."
        points: 16
      - description: "Developing (12)"
        long_description: "Code has some structure but comments are sparse or missing for one or more examples."
        points: 12
      - description: "Beginning (8)"
        long_description: "Code has little to no comments or structure. Hard to tell which example is which."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0

  - description: "Stretch Level Attempted"
    long_description: >
      Student attempted a stretch level beyond the base requirements.
    points: 20
    ratings:
      - description: "Advanced (20)"
        long_description: "Student completed the Advanced stretch: closure counter has decrement (with minimum 0), getCount(), and two independent counters are shown to not affect each other."
        points: 20
      - description: "Intermediate (16)"
        long_description: "Student completed the Intermediate stretch: hoisting example shows var as undefined before declaration, let TDZ shown via try...catch, and comment explains the difference."
        points: 16
      - description: "Base Completed (12)"
        long_description: "Student completed only the Base level but did so fully and correctly."
        points: 12
      - description: "Base Incomplete (8)"
        long_description: "Student attempted the Base level but did not complete all required elements."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or no recognizable attempt at any stretch level."
        points: 0

  - description: "Following Instructions"
    long_description: >
      Student followed the assignment instructions: correct file name, three
      distinct examples present with correct labels, comments included in each
      example, submitted via Canvas upload.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "File is named scope-closures.html. All three examples are present, labeled, and match the required topics. Comments explain the behavior. Submitted via Canvas."
        points: 20
      - description: "Achieving (16)"
        long_description: "Minor deviations from instructions (e.g., one example slightly off-topic or label missing) but overall instructions followed."
        points: 16
      - description: "Developing (12)"
        long_description: "Several instructions not followed (e.g., examples missing their labels, comments absent, one example wrong topic)."
        points: 12
      - description: "Beginning (8)"
        long_description: "Major departures from instructions. Submission barely resembles what was asked for."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0
