title: "Movie Review App Rubric"
free_form_criterion_comments: true

criteria:
  - description: "Code Correctness"
    long_description: >
      All four files are present and work together correctly. movies.json is
      valid with 10 objects and all required properties (title, year, genre,
      rating, watched). utils.js correctly implements and exports average,
      formatRating, and filterByGenre. app.js uses async/await correctly,
      checks response.ok, filters watched movies, calculates average rating,
      groups by genre with reduce, and logs formatted summaries. No console errors.
    points: 40
    ratings:
      - description: "Excelling (40)"
        long_description: "All four files present and working. JSON is valid with 10 correct objects. All three utility functions produce correct output. Async fetch with response.ok check works. Watched filter, average calculation, genre grouping with reduce, and formatted star summaries all work correctly. No console errors."
        points: 40
      - description: "Achieving (32)"
        long_description: "All four files present. Core functionality works but one or two elements have issues (e.g., reduce grouping has a minor error or formatRating star count is off). Async fetch and module imports work."
        points: 32
      - description: "Developing (24)"
        long_description: "Most files present. Fetch and module imports work but some utility functions or processing steps have significant errors. At least the basic data loading and filtering works."
        points: 24
      - description: "Beginning (16)"
        long_description: "Some files present but major problems. Module system not working, fetch failing, or utility functions not producing correct output. Limited output in console."
        points: 16
      - description: "No Evidence (0)"
        long_description: "Nothing submitted, or the submitted files do not match the assignment requirements."
        points: 0

  - description: "Code Readability"
    long_description: >
      Code is cleanly formatted across all files. Import statements are grouped
      at the top of app.js. Each file has a clear purpose evident from its
      structure. Variable and function names are descriptive. Template literals
      are used for formatted output. Comments are present where helpful.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "All files are neatly formatted. Imports are at the top of app.js. Descriptive variable names throughout. Template literals used for formatted output. Clear comments or structure makes each file's purpose obvious."
        points: 20
      - description: "Achieving (16)"
        long_description: "Code is mostly readable. Minor formatting issues. Variable names are generally clear. Template literals used."
        points: 16
      - description: "Developing (12)"
        long_description: "Code has noticeable formatting issues across files. Some unclear variable names. Basic structure is still understandable."
        points: 12
      - description: "Beginning (8)"
        long_description: "Code is hard to read across multiple files. Poor indentation, unclear names, no comments."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0

  - description: "Stretch Level Attempted"
    long_description: >
      Student attempted a stretch level beyond the base requirements.
    points: 20
    ratings:
      - description: "Advanced (20)"
        long_description: "Student completed the Advanced stretch: genre filter select element is populated dynamically, event listener updates the displayed movies when genre changes, and all genres display correctly."
        points: 20
      - description: "Intermediate (16)"
        long_description: "Student completed the Intermediate stretch: movie summaries are written to the DOM with innerHTML, formatted as a list with title, year, genre, and star rating."
        points: 16
      - description: "Base Completed (12)"
        long_description: "Student completed only the Base level (console output only) but did so fully and correctly."
        points: 12
      - description: "Base Incomplete (8)"
        long_description: "Student attempted the Base level but did not complete all required elements."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or no recognizable attempt at any stretch level."
        points: 0

  - description: "Following Instructions"
    long_description: >
      Student followed the assignment instructions: all four files present with
      correct names, movies.json has exactly 10 objects, utils.js uses named
      exports, index.html uses type=module, all files uploaded to Canvas.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "All four files correctly named and present. movies.json has exactly 10 objects with all required properties. Named exports used in utils.js. type=module in index.html. All four files submitted via Canvas."
        points: 20
      - description: "Achieving (16)"
        long_description: "Minor deviations from instructions (e.g., 9 movies instead of 10 or one file slightly named differently) but overall instructions followed."
        points: 16
      - description: "Developing (12)"
        long_description: "Several instructions not followed (e.g., wrong number of movies, default exports used instead of named, type=module missing, fewer than 4 files submitted)."
        points: 12
      - description: "Beginning (8)"
        long_description: "Major departures from instructions. Submission barely resembles what was asked for."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0
