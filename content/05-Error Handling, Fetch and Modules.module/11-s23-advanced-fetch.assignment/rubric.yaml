title: "Async Student Loader Rubric"
free_form_criterion_comments: true

criteria:
  - description: "Code Correctness"
    long_description: >
      loadStudents is declared as an async function and correctly uses await for
      both the fetch call and the JSON parse. response.ok is checked and throws
      a specific 404 error message for 404 status codes. A try/catch handles
      errors and returns an empty array on failure. The function is called inside
      an async IIFE. A-grade filtering and logging work correctly. A POST config
      object with method, headers, and body is logged.
    points: 40
    ratings:
      - description: "Excelling (40)"
        long_description: "async function uses await correctly for fetch and json(). response.ok is checked with a 404-specific message. try/catch returns []. IIFE pattern is correct. A-grade filtering works. POST config has all three required properties and is logged with a comment. No console errors."
        points: 40
      - description: "Achieving (32)"
        long_description: "Most requirements met. One or two minor issues (e.g., 404 message not specific or POST config missing one property) but core async/await fetch pattern works correctly."
        points: 32
      - description: "Developing (24)"
        long_description: "Async function and await are used but have errors. Status checking is missing or incorrect. At least the basic async fetch and parse works."
        points: 24
      - description: "Beginning (16)"
        long_description: "Attempt is made but async/await is used incorrectly or the fetch does not work. Significant parts of the requirements are missing."
        points: 16
      - description: "No Evidence (0)"
        long_description: "Nothing submitted, or the submitted file does not match the assignment requirements."
        points: 0

  - description: "Code Readability"
    long_description: >
      Code is cleanly formatted. The async function is clearly structured.
      await calls are on their own lines. Variable names are meaningful.
      The POST config object is clearly labeled with a comment explaining
      it is not actually sent.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "Async function is neatly structured. await calls are clear. Comment on POST config explains it is simulated. Code is easy to read throughout."
        points: 20
      - description: "Achieving (16)"
        long_description: "Code is mostly readable. Comment may be missing or brief. Minor formatting issues."
        points: 16
      - description: "Developing (12)"
        long_description: "Code has noticeable formatting issues but async structure is still understandable."
        points: 12
      - description: "Beginning (8)"
        long_description: "Code is hard to read. Indentation is inconsistent or the async pattern is difficult to follow."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0

  - description: "Stretch Level Attempted"
    long_description: >
      Student attempted a stretch level beyond the base requirements.
    points: 20
    ratings:
      - description: "Advanced (20)"
        long_description: "Student completed the Advanced stretch: wrote retryFetch() with a loop, logs each failed attempt, and throws a final error after all attempts fail. Tested with a missing file."
        points: 20
      - description: "Intermediate (16)"
        long_description: "Student completed the Intermediate stretch: wrote a generic loadJSON function, refactored loadStudents to use it, created courses.json, and logged both data sets."
        points: 16
      - description: "Base Completed (12)"
        long_description: "Student completed only the Base level but did so fully and correctly."
        points: 12
      - description: "Base Incomplete (8)"
        long_description: "Student attempted the Base level but did not complete all required elements."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or no recognizable attempt at any stretch level."
        points: 0

  - description: "Following Instructions"
    long_description: >
      Student followed the assignment instructions: correct file name,
      function named loadStudents, IIFE pattern used, both files submitted.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "File is named async-loader.html. Function is named loadStudents. IIFE pattern is used. Both files submitted via Canvas."
        points: 20
      - description: "Achieving (16)"
        long_description: "Minor deviations from instructions (e.g., function named differently or IIFE pattern slightly off) but overall instructions followed."
        points: 16
      - description: "Developing (12)"
        long_description: "Several instructions not followed (e.g., async pattern not used, IIFE missing, only one file submitted)."
        points: 12
      - description: "Beginning (8)"
        long_description: "Major departures from instructions. Submission barely resembles what was asked for."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0
