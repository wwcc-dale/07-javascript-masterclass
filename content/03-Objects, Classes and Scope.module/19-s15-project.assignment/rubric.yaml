title: "Library Catalog Project Rubric"
free_form_criterion_comments: true

criteria:
  - description: "Code Correctness"
    long_description: >
      The submitted HTML file runs without errors. The Book class is defined
      correctly with all four properties and three methods. The catalog array
      has 5 instances. filter, map, and forEach all produce correct output.
      The checkout() demonstration shows the status change correctly.
    points: 40
    ratings:
      - description: "Excelling (40)"
        long_description: "File opens without errors. Book class correct with all properties and methods. All three array methods produce correct output. Checkout demonstration shows before and after status."
        points: 40
      - description: "Achieving (32)"
        long_description: "Most requirements correct. One or two minor issues (e.g., describe() format slightly off or one array method missing a label) but the class and core logic work."
        points: 32
      - description: "Developing (24)"
        long_description: "Class is defined and instances created but one method is wrong or one of the three array method steps is missing."
        points: 24
      - description: "Beginning (16)"
        long_description: "Significant errors. Class has major issues or two or more of the required steps are missing or broken."
        points: 16
      - description: "No Evidence (0)"
        long_description: "Nothing submitted, or the submitted file does not match the assignment requirements."
        points: 0

  - description: "Code Readability"
    long_description: >
      Code is cleanly formatted. Indentation is consistent. Class name is
      capitalized. Method names use camelCase. Template literal is used in
      describe(). Console log statements include meaningful labels.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "Class is neatly indented. Book is capitalized. All methods use camelCase. describe() uses a template literal. Log statements have clear, descriptive labels."
        points: 20
      - description: "Achieving (16)"
        long_description: "Code is mostly readable. Minor formatting issues or one label missing."
        points: 16
      - description: "Developing (12)"
        long_description: "Code has noticeable formatting issues or missing labels but the structure is still understandable."
        points: 12
      - description: "Beginning (8)"
        long_description: "Code is hard to read. Little attention paid to indentation, naming, or labels."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0

  - description: "Stretch Level Attempted"
    long_description: >
      Student attempted a stretch level beyond the base requirements.
    points: 20
    ratings:
      - description: "Advanced (20)"
        long_description: "Student completed the Advanced stretch: closure-based checkout tracker works correctly, Library class has listAvailable() using filter and map, and all demonstrations produce correct output."
        points: 20
      - description: "Intermediate (16)"
        long_description: "Student completed the Intermediate stretch: Library class with addBook() and findByAuthor() works correctly, all 5 books added, and findByAuthor() returns correct results."
        points: 16
      - description: "Base Completed (12)"
        long_description: "Student completed only the Base level but did so fully and correctly."
        points: 12
      - description: "Base Incomplete (8)"
        long_description: "Student attempted the Base level but did not complete all required elements."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or no recognizable attempt at any stretch level."
        points: 0

  - description: "Following Instructions"
    long_description: >
      Student followed the assignment instructions: correct file name, class
      named Book with capital B, returnBook() used instead of return(), correct
      number of instances, submitted via Canvas upload.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "File is named library-catalog.html. Class is named Book. returnBook() used correctly. Catalog has exactly 5 instances with mixed availability. Submitted via Canvas."
        points: 20
      - description: "Achieving (16)"
        long_description: "Minor deviations (e.g., slight file name difference or 4 instances instead of 5) but overall instructions followed."
        points: 16
      - description: "Developing (12)"
        long_description: "Several instructions not followed (e.g., class name wrong, return used instead of returnBook, fewer than 4 instances)."
        points: 12
      - description: "Beginning (8)"
        long_description: "Major departures from instructions. Submission barely resembles what was asked for."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0
