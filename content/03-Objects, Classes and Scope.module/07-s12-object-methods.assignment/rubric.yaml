title: "User Object with Methods Rubric"
free_form_criterion_comments: true

criteria:
  - description: "Code Correctness"
    long_description: >
      The submitted HTML file runs without errors. The user object has at least
      5 properties and 2 methods using correct this references. Destructuring,
      cloning with spread, and merging with spread are all implemented correctly.
    points: 40
    ratings:
      - description: "Excelling (40)"
        long_description: "File opens without errors. Object has 5+ properties and 2 methods with correct this usage. Destructuring, cloning, and merging all work and produce correct console output."
        points: 40
      - description: "Achieving (32)"
        long_description: "Most steps correct. One or two minor issues (e.g., a method returns undefined or spread is used inconsistently) but core requirements are met."
        points: 32
      - description: "Developing (24)"
        long_description: "File opens but has errors in some steps. At least three of the five main tasks (object creation, methods, destructuring, cloning, merging) are completed correctly."
        points: 24
      - description: "Beginning (16)"
        long_description: "File has significant errors. Fewer than three tasks are completed correctly or the console shows errors."
        points: 16
      - description: "No Evidence (0)"
        long_description: "Nothing submitted, or the submitted file does not match the assignment requirements."
        points: 0

  - description: "Code Readability"
    long_description: >
      Code is cleanly formatted. Indentation is consistent throughout. Variable,
      property, and method names are meaningful and use camelCase. Code is easy
      to follow step by step.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "Code is neatly indented. All names use camelCase and are meaningful. Methods are clearly written using shorthand syntax. Easy to read at a glance."
        points: 20
      - description: "Achieving (16)"
        long_description: "Code is mostly readable with minor formatting inconsistencies. Names are generally correct."
        points: 16
      - description: "Developing (12)"
        long_description: "Code has noticeable formatting issues or unclear names, but the structure is still understandable."
        points: 12
      - description: "Beginning (8)"
        long_description: "Code is hard to read. Little attention paid to indentation, naming, or structure."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0

  - description: "Stretch Level Attempted"
    long_description: >
      Student attempted a stretch level beyond the base requirements.
    points: 20
    ratings:
      - description: "Advanced (20)"
        long_description: "Student completed the Advanced stretch: wrote a reusable mergeProfiles() function using reduce and spread, called it with 3 objects, and added a summary() method using a template literal."
        points: 20
      - description: "Intermediate (16)"
        long_description: "Student completed the Intermediate stretch: added isAdult() method with correct logic, and used destructuring with a default value for a missing property."
        points: 16
      - description: "Base Completed (12)"
        long_description: "Student completed only the Base level but did so fully and correctly."
        points: 12
      - description: "Base Incomplete (8)"
        long_description: "Student attempted the Base level but did not complete all required elements."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or no recognizable attempt at any stretch level."
        points: 0

  - description: "Following Instructions"
    long_description: >
      Student followed the assignment instructions: correct file name, all five
      steps completed, methods use this correctly, submitted via Canvas upload.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "File is named user-object.html. All steps completed in order. Methods use method shorthand and this correctly. Submitted via Canvas."
        points: 20
      - description: "Achieving (16)"
        long_description: "Minor deviations from instructions (e.g., slight file name difference or one step slightly off) but overall instructions followed."
        points: 16
      - description: "Developing (12)"
        long_description: "Several instructions not followed (e.g., methods missing, arrow functions used instead of shorthand, steps skipped)."
        points: 12
      - description: "Beginning (8)"
        long_description: "Major departures from instructions. Submission barely resembles what was asked for."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0
