title: "Safe Math Functions Rubric"
free_form_criterion_comments: true

criteria:
  - description: "Code Correctness"
    long_description: >
      Both safeDivide and parseNumber are implemented correctly. safeDivide throws
      an Error when b is 0 and returns the correct result otherwise. parseNumber
      throws a TypeError when the input is not a number string and returns the
      correct number otherwise. All calls are wrapped in try/catch blocks and
      at least one includes a finally block. Error name and message are logged
      for the TypeError case.
    points: 40
    ratings:
      - description: "Excelling (40)"
        long_description: "Both functions work correctly. All required try/catch blocks are present. finally block is used. error.name and error.message are both logged. All valid calls produce correct output. No unhandled errors in the console."
        points: 40
      - description: "Achieving (32)"
        long_description: "Both functions are implemented and mostly correct. One or two minor issues (e.g., finally block missing or error.name not logged) but core logic is correct."
        points: 32
      - description: "Developing (24)"
        long_description: "At least one function works correctly. try/catch is used but some required elements are missing or incorrect."
        points: 24
      - description: "Beginning (16)"
        long_description: "Functions are attempted but have significant errors. try/catch blocks are incomplete or missing for most calls."
        points: 16
      - description: "No Evidence (0)"
        long_description: "Nothing submitted, or the submitted file does not match the assignment requirements."
        points: 0

  - description: "Code Readability"
    long_description: >
      Code is cleanly formatted with consistent indentation. Function names use
      camelCase. Each function has a comment describing what it does and what
      error it throws. Code is easy to read at a glance.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "Code is neatly indented throughout. Both functions have clear comments. Names use camelCase. Easy to read and understand."
        points: 20
      - description: "Achieving (16)"
        long_description: "Code is mostly readable with minor formatting issues. Comments are present but could be more descriptive."
        points: 16
      - description: "Developing (12)"
        long_description: "Code has noticeable formatting issues or comments are missing for one function. Structure is still understandable."
        points: 12
      - description: "Beginning (8)"
        long_description: "Code is hard to read. Little attention paid to indentation, naming, or comments."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0

  - description: "Stretch Level Attempted"
    long_description: >
      Student attempted a stretch level beyond the base requirements.
    points: 20
    ratings:
      - description: "Advanced (20)"
        long_description: "Student completed the Advanced stretch: wrote a safeRun() wrapper function that returns a result object and tested it with all three functions."
        points: 20
      - description: "Intermediate (16)"
        long_description: "Student completed the Intermediate stretch: wrote clampedValue() with a RangeError, tested it with in-range and out-of-range values, and used instanceof to check the error type."
        points: 16
      - description: "Base Completed (12)"
        long_description: "Student completed only the Base level but did so fully and correctly."
        points: 12
      - description: "Base Incomplete (8)"
        long_description: "Student attempted the Base level but did not complete all required elements."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or no recognizable attempt at any stretch level."
        points: 0

  - description: "Following Instructions"
    long_description: >
      Student followed the assignment instructions: correct file name, both
      functions named correctly, all steps completed, submitted via Canvas upload.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "File is named safe-math.html. Both functions are named safeDivide and parseNumber. All steps are completed. Submitted via Canvas."
        points: 20
      - description: "Achieving (16)"
        long_description: "Minor deviations from instructions (e.g., slight difference in function name or one step missing) but overall instructions followed."
        points: 16
      - description: "Developing (12)"
        long_description: "Several instructions not followed (e.g., functions renamed, multiple steps missing, wrong submission method)."
        points: 12
      - description: "Beginning (8)"
        long_description: "Major departures from instructions. Submission barely resembles what was asked for."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0
