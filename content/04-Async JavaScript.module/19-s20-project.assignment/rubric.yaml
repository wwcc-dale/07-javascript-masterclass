title: "Credit 4 Synthesis — Task Timer Rubric"
free_form_criterion_comments: true

criteria:
  - description: "Code Correctness"
    long_description: >
      The submitted HTML file runs without errors in a browser. The tasks array has at least
      four objects with name and durationMs. runTask logs start and finish timestamps and
      returns the task name. runAllSequential runs tasks one at a time and logs total time.
      runAllParallel uses Promise.all, runs all tasks simultaneously, and logs total time.
      Parallel time is noticeably shorter than sequential time. JSON.stringify output is
      logged at the end.
    points: 40
    ratings:
      - description: "Excelling (40)"
        long_description: "File opens without errors. All functions work exactly as specified. Sequential and parallel runs produce correct output. Timing clearly shows parallel is faster. JSON output is present and well-formed."
        points: 40
      - description: "Achieving (32)"
        long_description: "File opens and most features work. One minor issue — for example, timing is missing from one run, or JSON is logged without pretty-print — but core async logic is correct."
        points: 32
      - description: "Developing (24)"
        long_description: "File opens but has logic errors. runTask works and at least one of runAllSequential or runAllParallel produces correct output."
        points: 24
      - description: "Beginning (16)"
        long_description: "File has significant errors. runTask or the async functions do not work correctly, or the console shows errors."
        points: 16
      - description: "No Evidence (0)"
        long_description: "Nothing submitted, or the submitted file does not match the assignment requirements."
        points: 0

  - description: "Code Readability"
    long_description: >
      Code is formatted cleanly. Each function is separated by a comment label. Indentation
      inside async functions is consistent. Variable names are meaningful. The main function
      clearly separates the sequential run, parallel run, and JSON summary with log dividers.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "Code is neatly indented throughout. All functions have comment labels. Log dividers separate the three output sections. Variable names are clear and purposeful."
        points: 20
      - description: "Achieving (16)"
        long_description: "Code is mostly readable with minor formatting inconsistencies. Most sections are labeled."
        points: 16
      - description: "Developing (12)"
        long_description: "Code has noticeable formatting issues but the structure is still understandable."
        points: 12
      - description: "Beginning (8)"
        long_description: "Code is hard to read. Little to no attention paid to indentation, naming, or structure."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0

  - description: "Stretch Level Attempted"
    long_description: >
      Student attempted a stretch level beyond the base requirements.
    points: 20
    ratings:
      - description: "Advanced (20)"
        long_description: "Student completed the Advanced stretch: results tracked in a Map, outcomes stored per task, JSON.stringify(Object.fromEntries(results)) logged, and a Set used to track unique statuses."
        points: 20
      - description: "Intermediate (16)"
        long_description: "Student completed the Intermediate stretch: runTask accepts a timeoutMs argument, uses Promise.race to implement a timeout, and a timeout task is demonstrated with error handling."
        points: 16
      - description: "Base Completed (12)"
        long_description: "Student completed only the Base level but did so fully and correctly."
        points: 12
      - description: "Base Incomplete (8)"
        long_description: "Student attempted the Base level but did not complete all required elements."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or no recognizable attempt at any stretch level."
        points: 0

  - description: "Following Instructions"
    long_description: >
      Student followed the assignment instructions: correct file name, tasks array with
      at least four objects, correct function names (runTask, runAllSequential, runAllParallel),
      main function calls both run functions and logs JSON summary, submission via Canvas upload.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "File is named task-timer.html. All four required functions are present with correct names. Tasks array has at least four entries. main() calls both run functions and logs JSON. Submitted via Canvas."
        points: 20
      - description: "Achieving (16)"
        long_description: "Minor deviations from instructions (e.g., slightly different function names or fewer than four tasks) but overall instructions followed."
        points: 16
      - description: "Developing (12)"
        long_description: "Several instructions were not followed (e.g., missing functions, JSON not logged, or main function not called)."
        points: 12
      - description: "Beginning (8)"
        long_description: "Major departures from instructions. The submission barely resembles what was asked for."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0
