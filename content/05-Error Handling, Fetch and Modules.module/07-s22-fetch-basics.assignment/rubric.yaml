title: "Student Data Loader Rubric"
free_form_criterion_comments: true

criteria:
  - description: "Code Correctness"
    long_description: >
      students.json is a valid JSON array with at least 5 student objects containing
      name, grade, and year properties. The HTML file correctly fetches students.json,
      parses it with response.json(), filters for A-grade students using .filter(),
      logs the count and each name using .forEach(), and handles errors with .catch().
    points: 40
    ratings:
      - description: "Excelling (40)"
        long_description: "JSON file is valid with 5+ students and correct structure. Fetch chain is correct: fetch → .json() → filter → forEach. Count is logged. Each A-grade student's name is logged. .catch() is present with a useful message. No console errors."
        points: 40
      - description: "Achieving (32)"
        long_description: "Both files are present and mostly correct. One or two minor issues (e.g., .catch() missing or count not logged) but the core fetch and filter logic works."
        points: 32
      - description: "Developing (24)"
        long_description: "Fetch is attempted and JSON file is present, but the chain has errors or filtering is not working correctly. At least the basic fetch and parse works."
        points: 24
      - description: "Beginning (16)"
        long_description: "Files are present but the fetch chain or JSON file has significant errors. Data does not load or display correctly."
        points: 16
      - description: "No Evidence (0)"
        long_description: "Nothing submitted, or the submitted files do not match the assignment requirements."
        points: 0

  - description: "Code Readability"
    long_description: >
      Code is cleanly formatted with consistent indentation. The fetch chain is
      clearly written with each .then() on its own line. Variable names are
      meaningful (students, aStudents, etc.). The JSON file is properly formatted.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "Fetch chain is neatly formatted with clear variable names. JSON file is well formatted. Code is easy to read at a glance."
        points: 20
      - description: "Achieving (16)"
        long_description: "Code is mostly readable with minor formatting issues. Fetch chain is understandable but could be cleaner."
        points: 16
      - description: "Developing (12)"
        long_description: "Code has noticeable formatting issues but the structure is still understandable."
        points: 12
      - description: "Beginning (8)"
        long_description: "Code is hard to read. Inconsistent indentation, unclear names, or the fetch chain is difficult to follow."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0

  - description: "Stretch Level Attempted"
    long_description: >
      Student attempted a stretch level beyond the base requirements.
    points: 20
    ratings:
      - description: "Advanced (20)"
        long_description: "Student completed the Advanced stretch: output is written to the DOM using innerHTML with a formatted list of A-grade students, a heading, and a count."
        points: 20
      - description: "Intermediate (16)"
        long_description: "Student completed the Intermediate stretch: average year is calculated and formatted with toFixed(2), and the student with the highest year is found using .reduce()."
        points: 16
      - description: "Base Completed (12)"
        long_description: "Student completed only the Base level but did so fully and correctly."
        points: 12
      - description: "Base Incomplete (8)"
        long_description: "Student attempted the Base level but did not complete all required elements."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted or no recognizable attempt at any stretch level."
        points: 0

  - description: "Following Instructions"
    long_description: >
      Student followed the assignment instructions: files are correctly named,
      student data matches the required structure, both files uploaded to Canvas.
    points: 20
    ratings:
      - description: "Excelling (20)"
        long_description: "Files are named students.json and student-loader.html. JSON has 5+ students with correct properties. Both files submitted via Canvas."
        points: 20
      - description: "Achieving (16)"
        long_description: "Minor deviations from instructions (e.g., fewer than 5 students or slight file name difference) but overall instructions followed."
        points: 16
      - description: "Developing (12)"
        long_description: "Several instructions not followed (e.g., JSON structure incorrect, files named differently, only one file submitted)."
        points: 12
      - description: "Beginning (8)"
        long_description: "Major departures from instructions. Submission barely resembles what was asked for."
        points: 8
      - description: "No Evidence (0)"
        long_description: "Nothing submitted."
        points: 0
